<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letter for Her</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <div class="envelope-wrapper" id="envelope">
    <div class="envelope">
      <div class="letter">
        <div class="text">
          <strong>Dear Aafiyaaa 💗</strong>
          <p id="typed-text"></p>
        </div>
      </div>
    </div>
    <div class="heart"></div>
  </div>
</div>

<script>
const envelope = document.getElementById("envelope");
const textEl = document.getElementById("typed-text");

const message = `Hey Aaaafiyaaa!,

I’m not the best at putting feelings into words, but I wanted to tell you this properly:

These past three years of college wouldn’t have been the same without you. Thank you for being such amazing company, for always being there for me, and most importantly, for always being real with me. From all the memories we’ve shared—both in person and online—you’ve become such an important part of my college life.

I’m genuinely so grateful for our friendship, and it’s one of those connections I truly never want to lose. No matter where life takes us after college, I really hope we stay in each other’s lives, because having you as a friend has meant a lot more to me than I can probably explain 🤍
`;

let i = 0;
let typingTimer = null;
let typedOnce = false;

function resetTyping() {
  clearTimeout(typingTimer);
  textEl.innerHTML = "";
  i = 0;
  typedOnce = false;
}

function typeText() {
  if (i < message.length) {
    textEl.innerHTML += message[i] === "\n" ? "<br>" : message[i];
    i++;
    typingTimer = setTimeout(typeText, 25);
  }
}

envelope.addEventListener("click", () => {
  envelope.classList.toggle("flap");

  if (envelope.classList.contains("flap") && !typedOnce) {
    typedOnce = true;
    resetTyping();
    setTimeout(typeText, 1200);
  }

  if (!envelope.classList.contains("flap")) {
    resetTyping();
  }
});
</script>

</body>
</html>
